<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Trainingsplan – Detailliert</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #f7f5f0;
  --bg2: #ffffff;
  --bg3: #f0ede6;
  --border: #e4e1da;
  --text: #1a1916;
  --text2: #6a6860;
  --text3: #9a9890;
  --teal: #1D9E75; --teal-bg: #dff5ec; --teal-dark: #0a5a44;
  --blue: #185FA5; --blue-bg: #deedfb; --blue-dark: #0c3d6e;
  --amber: #BA7517; --amber-bg: #faecd8; --amber-dark: #7a4609;
  --coral: #993C1D; --coral-bg: #fae8e0; --coral-dark: #6b2a12;
  --r: 14px; --rs: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px 16px 40px; font-size: 14px; line-height: 1.5; }

h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; margin-bottom: 2px; }
.sub { font-size: 13px; color: var(--text3); margin-bottom: 20px; }

/* Phase selector */
.phase-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
.ppill {
  padding: 8px 16px; border-radius: 30px;
  border: 1px solid var(--border); background: var(--bg2);
  font-size: 13px; font-weight: 500; color: var(--text2);
  cursor: pointer; transition: all 0.18s; white-space: nowrap;
}
.ppill:hover { border-color: #b0aea6; color: var(--text); }
.ppill.active { color: #fff; border-color: transparent; }

/* Tab row (days) */
.day-tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; margin-bottom: 16px; }
.day-tabs::-webkit-scrollbar { display: none; }
.dtab {
  flex-shrink: 0; padding: 7px 14px; border-radius: 30px;
  border: 1px solid var(--border); background: var(--bg2);
  font-size: 12px; font-weight: 500; color: var(--text2);
  cursor: pointer; transition: all 0.15s;
}
.dtab:hover { border-color: #b0aea6; }
.dtab.active { color: #fff; border-color: transparent; }
.dtab.t-lauf.active  { background: var(--teal); }
.dtab.t-rad.active   { background: var(--blue); }
.dtab.t-kraft.active { background: var(--amber); }
.dtab.t-regen.active { background: #7a7870; }
.dtab.t-kombi.active { background: #8a3560; }

/* Card */
.card { background: var(--bg2); border-radius: var(--r); border: 0.5px solid var(--border); padding: 16px 18px; margin-bottom: 12px; }
.card-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; }

/* Day header */
.day-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.day-badge { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; }
.day-title { font-size: 17px; font-weight: 600; }
.day-duration { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }

/* Section within day */
.section { margin-bottom: 16px; }
.section-title {
  font-size: 12px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.06em;
  margin-bottom: 8px; padding-bottom: 6px;
  border-bottom: 0.5px solid var(--border);
}

/* Exercise rows */
.ex-list { display: flex; flex-direction: column; gap: 6px; }
.ex {
  display: flex; align-items: flex-start;
  background: var(--bg3); border-radius: var(--rs);
  padding: 10px 12px; gap: 10px;
}
.ex-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.ex-body { flex: 1; }
.ex-name { font-size: 13px; font-weight: 500; color: var(--text); }
.ex-detail { font-size: 12px; color: var(--text2); margin-top: 2px; line-height: 1.4; }
.ex-badge {
  font-size: 11px; font-weight: 600; padding: 3px 9px;
  border-radius: 20px; flex-shrink: 0; align-self: flex-start;
  font-family: 'DM Mono', monospace;
}

/* Zone pill */
.zone-pill {
  display: inline-block; font-size: 11px; font-weight: 600;
  padding: 2px 10px; border-radius: 20px; margin-bottom: 10px;
}

/* Info box */
.info-box {
  background: var(--bg3); border-radius: var(--rs);
  padding: 10px 12px; font-size: 12px; color: var(--text2);
  line-height: 1.55; border-left: 2px solid var(--accent, #ccc);
  margin-top: 4px;
}

/* Regen day */
.regen-list { display: flex; flex-direction: column; gap: 6px; }
.regen-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); }
.regen-item::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }

/* Progress bar */
.prog-bar { height: 5px; border-radius: 4px; background: var(--border); margin-top: 6px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 4px; }

/* Metric chips */
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.chip { background: var(--bg3); border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 500; color: var(--text2); }
.chip span { font-family: 'DM Mono', monospace; color: var(--text); font-weight: 600; }
</style>
</head>

// ─── STATE ────────────────────────────────────────────────────────────────
let curPhase = 0;
let curDay   = 0;

// ─── RENDER ───────────────────────────────────────────────────────────────
function renderPhases() {
  document.getElementById('phaseRow').innerHTML = phases.map((p,i) => `
    <div class="ppill ${i===curPhase?'active':''}"
      style="${i===curPhase?'background:'+p.col+';border-color:'+p.col:''}"
      onclick="selectPhase(${i})">${p.label} – ${p.sub}</div>`).join('');
}

function renderDayTabs() {
  const p = phases[curPhase];
  document.getElementById('dayTabs').innerHTML = p.days.map((d,i) => `
    <div class="dtab t-${d.type} ${i===curDay?'active':''}" onclick="selectDay(${i})">${d.short}</div>`
  ).join('');
}

function renderDay() {
  const p  = phases[curPhase];
  const d  = p.days[curDay];
  const tc = {lauf:"#dff5ec",rad:"#deedfb",kraft:"#faecd8",regen:"#f0ede6",kombi:"#fbe8f0"};

  // chips
  const chipsHtml = p.chips.map(c=>`<div class="chip">${c.l}: <span>${c.v}</span></div>`).join('');

  // sections
  const sectionsHtml = d.sections.map(s => `
    <div class="section">
      <div class="section-title">${s.title}</div>
      <div class="ex-list">
        ${s.exercises.map(e => `
          <div class="ex">
            <div class="ex-icon">${e.icon}</div>
            <div class="ex-body">
              <div class="ex-name">${e.name}</div>
              <div class="ex-detail">${e.detail}</div>
            </div>
            <div class="ex-badge" style="background:${e.bg};color:${e.bc}">${e.badge}</div>
          </div>`).join('')}
      </div>
    </div>`).join('');

  document.getElementById('dayContent').innerHTML = `
    <div class="card">
      <div class="chips">${chipsHtml}</div>
      <div class="day-header">
        <div class="day-badge" style="background:${d.badge.bg};color:${d.badge.col}">${d.badge.label}</div>
        <div class="day-duration">${d.duration}</div>
      </div>
      <div class="day-title">${d.title}</div>
    </div>
    <div class="card">
      ${sectionsHtml}
      <div class="info-box" style="--accent:${p.col}">${d.info.text}</div>
    </div>
  `;
}

function selectPhase(i) { curPhase=i; curDay=0; renderPhases(); renderDayTabs(); renderDay(); }
function selectDay(i)   { curDay=i; renderDayTabs(); renderDay(); }

renderPhases();
renderDayTabs();
renderDay();
</script>
