<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>2-Jahres Masterplan · Marathon &amp; Ötztaler</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#f7f5f0;--bg2:#ffffff;--bg3:#f0ede6;--border:#e4e1da;--text:#1a1916;--text2:#6a6860;--text3:#9a9890;--shadow:0 1px 3px rgba(0,0,0,.05),0 4px 12px rgba(0,0,0,.04);--teal:#1D9E75;--teal-bg:#dff5ec;--teal-dark:#0a5a44;--blue:#185FA5;--blue-bg:#deedfb;--blue-dark:#0c3d6e;--amber:#BA7517;--amber-bg:#faecd8;--amber-dark:#7a4609;--coral:#993C1D;--coral-bg:#fae8e0;--coral-dark:#6b2a12;--r:14px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
/* HEADER */
.hdr{position:sticky;top:0;z-index:200;background:rgba(247,245,240,.95);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:13px 20px 11px}
.hdr-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;border-radius:9px;background:var(--teal-bg);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.logo-name{font-family:'DM Serif Display',serif;font-size:17px;line-height:1.2}
.logo-sub{font-size:11px;color:var(--text3)}
.nav-wrap{display:flex;background:var(--bg3);border-radius:28px;padding:3px;gap:2px;border:1px solid var(--border)}
.npill{font-size:12px;font-weight:500;padding:6px 16px;border-radius:24px;border:none;background:transparent;color:var(--text2);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.npill:hover{color:var(--text)}
.npill.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1)}
/* PANELS */
.panel{display:none;max-width:900px;margin:0 auto;padding:20px 16px 60px}
.panel.active{display:block}
/* TRAINING */
.phase-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.ppill{padding:7px 16px;border-radius:30px;border:1px solid var(--border);background:var(--bg2);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .18s;white-space:nowrap;box-shadow:var(--shadow)}
.ppill:hover{border-color:#b0aea6;color:var(--text)}
.ppill.active{color:#fff;border-color:transparent}
.day-tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:16px}
.day-tabs::-webkit-scrollbar{display:none}
.dtab{flex-shrink:0;padding:6px 13px;border-radius:28px;border:1px solid var(--border);background:var(--bg2);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s}
.dtab:hover{border-color:#b0aea6}
.dtab.active{color:#fff;border-color:transparent}
.dtab.t-lauf.active{background:var(--teal)}
.dtab.t-rad.active{background:var(--blue)}
.dtab.t-kraft.active{background:var(--amber)}
.dtab.t-regen.active{background:#7a7870}
.dtab.t-kombi.active{background:#8a3560}
.card{background:var(--bg2);border-radius:var(--r);border:.5px solid var(--border);padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.day-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.day-badge{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px}
.day-title{font-family:'DM Serif Display',serif;font-size:19px;margin-bottom:4px}
.day-dur{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.section{margin-bottom:16px}
.section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;padding-bottom:6px;border-bottom:.5px solid var(--border)}
.ex-list{display:flex;flex-direction:column;gap:6px}
.ex{display:flex;align-items:flex-start;background:var(--bg3);border-radius:var(--rs);padding:10px 12px;gap:10px;transition:transform .15s}
.ex:hover{transform:translateX(2px)}
.ex-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.ex-body{flex:1;min-width:0}
.ex-name{font-size:13px;font-weight:500}
.ex-detail{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.4}
.ex-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;flex-shrink:0;align-self:flex-start;font-family:'DM Mono',monospace;white-space:nowrap}
.info-box{background:var(--bg3);border-radius:var(--rs);padding:10px 13px;font-size:12px;color:var(--text2);line-height:1.55;border-left:2px solid var(--accent,#ccc);margin-top:4px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip{background:var(--bg3);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;color:var(--text2)}
.chip span{font-family:'DM Mono',monospace;color:var(--text);font-weight:600}
/* NUTRITION */
.stats-banner{display:grid;grid-template-columns:repeat(4,1fr);background:var(--bg2);border-radius:var(--r);border:.5px solid var(--border);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
@media(max-width:540px){.stats-banner{grid-template-columns:repeat(2,1fr)}}
.stat{padding:13px 14px;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
@media(max-width:540px){.stat:nth-child(2){border-right:none}.stat:nth-child(3){border-top:1px solid var(--border)}.stat:nth-child(4){border-top:1px solid var(--border);border-right:none}}
.stat-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.stat-val{font-size:20px;font-weight:600;line-height:1}
.stat-sub{font-size:10px;color:var(--text3);margin-top:3px}
.macro-card{background:var(--bg2);border-radius:var(--r);border:.5px solid var(--border);padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow)}
.macro-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.mrow{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.mrow:last-child{margin-bottom:0}
.mlabel{font-size:11px;font-weight:500;color:var(--text2);width:130px;flex-shrink:0}
.mtrack{flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}
.mfill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.mpct{font-size:11px;color:var(--text3);width:32px;text-align:right;font-family:'DM Mono',monospace}
.meal-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.mtab{font-size:12px;font-weight:500;padding:6px 14px;border-radius:28px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.mtab:hover{border-color:#b0aea6}
.mtab.active{background:var(--text);color:#fff;border-color:transparent}
.recipe-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:520px){.recipe-grid{grid-template-columns:1fr}}
.rcard{background:var(--bg3);border-radius:var(--rs);padding:12px 14px;border-left:3px solid;transition:transform .15s}
.rcard:hover{transform:translateY(-1px)}
.rcard-name{font-size:13px;font-weight:600;margin-bottom:4px}
.rcard-desc{font-size:12px;color:var(--text2);line-height:1.45;margin-bottom:6px}
.rcard-kcal{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:7px}
.rtags{display:flex;flex-wrap:wrap;gap:3px}
.rtag{font-size:10px;padding:2px 7px;border-radius:7px;font-weight:600}
.rt-o{background:#deedfb;color:#0c3d6e}
.rt-b{background:#dff5ec;color:#0a5a44}
.rt-p{background:#faecd8;color:#7a4609}
.rt-c{background:#fae8e0;color:#6b2a12}
.rt-pre{background:#eeedfe;color:#3C3489}
.rt-post{background:#fce8f4;color:#6B1F52}
.omega-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
@media(max-width:400px){.omega-grid{grid-template-columns:1fr}}
.oitem{display:flex;gap:9px;align-items:flex-start}
.odot{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0}
.otext{font-size:12px;color:var(--text2);line-height:1.45}
.otext strong{color:var(--text);font-weight:600;display:block;margin-bottom:1px}
.tip-box{font-size:12px;color:var(--text2);padding:11px 13px;background:var(--bg3);border-radius:var(--rs);line-height:1.6;border-left:2px solid}
footer{text-align:center;padding:24px 16px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);margin-top:32px;letter-spacing:.02em}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-inner">
    <div class="logo">
      <div class="logo-icon">&#127956;</div>
      <div>
        <div class="logo-name">2-Jahres Masterplan</div>
        <div class="logo-sub">Marathon &middot; Otztaler &middot; 76 kg &middot; 180 cm &middot; 30 J</div>
      </div>
    </div>
    <div class="nav-wrap">
      <button class="npill active" onclick="switchPanel('training')">&#127939; Training</button>
      <button class="npill" onclick="switchPanel('ern')">&#129367; Ernahrung</button>
    </div>
  </div>
</header>

<section class="panel active" id="panel-training">
  <div class="phase-row" id="tPhaseRow"></div>
  <div class="day-tabs" id="tDayTabs"></div>
  <div id="tDayContent"></div>
</section>

<section class="panel" id="panel-ern">
  <div class="phase-row" id="ePhaseRow"></div>
  <div class="stats-banner" id="eStats"></div>
  <div class="macro-card">
    <div class="macro-title">Makronahrstoff-Verteilung</div>
    <div id="eMacros"></div>
  </div>
  <div class="card">
    <div class="card-label">Mahlzeiten &amp; Rezepte</div>
    <div class="meal-tabs" id="eMealTabs"></div>
    <div class="recipe-grid" id="eRecipes"></div>
  </div>
  <div class="card">
    <div class="card-label">Omega-3 &amp; Ballaststoff-Quellen</div>
    <div class="omega-grid" id="eOmega"></div>
    <div class="tip-box" id="eTip"></div>
  </div>
</section>

<footer>2-Jahres Masterplan &middot; Marathon &amp; Otztaler Radmarathon &middot; 76 kg &middot; 180 cm</footer>
<script>
const phases = [
  // ══════════════════════════════════════════════
  // PHASE 1 – FUNDAMENT (Monat 1–6)
  // ══════════════════════════════════════════════
  {
    id: 0, label: "Phase 1", sub: "Fundament", months: "Monat 1–6", col: "#1D9E75",
    chips: [
      {l:"Laufen / Wo", v:"20–35 km"},
      {l:"Rad / Wo", v:"60–100 km"},
      {l:"Kraft", v:"Bodyweight"},
      {l:"HF-Ziel", v:"Zone 2"},
    ],
    days: [
      {
        name:"Montag", short:"Mo", type:"regen",
        title:"Aktive Erholung & Dehnung",
        duration:"30–45 Min",
        badge:{bg:"#f0ede6", col:"#6a6860", label:"Regeneration"},
        sections:[
          {
            title:"Morgen-Mobilität (täglich empfohlen)",
            exercises:[
              {icon:"🔄", name:"Hüftkreise", detail:"Je 10× vor und rückwärts, stehend", badge:"2 × 10", bg:"#f0ede6", bc:"#9a9890"},
              {icon:"🦵", name:"Hüftbeuger-Dehnung (Couch Stretch)", detail:"Knie auf Boden, Oberkörper aufrecht – 45 Sek. pro Seite", badge:"2 × 45s", bg:"#f0ede6", bc:"#9a9890"},
              {icon:"🔁", name:"Cat-Cow (Wirbelsäulen-Mobilisation)", detail:"Langsam, mit Atemrhythmus – wichtig für Rückengesundheit", badge:"2 × 10", bg:"#f0ede6", bc:"#9a9890"},
              {icon:"🧘", name:"Pigeon Pose (Hüftöffner)", detail:"Pro Seite 60 Sek. halten, tief atmen", badge:"2 × 60s", bg:"#f0ede6", bc:"#9a9890"},
              {icon:"🦶", name:"Waden-Dehnung an der Wand", detail:"Gerade Knie + leicht gebeugt – je 30 Sek.", badge:"2 × 30s", bg:"#f0ede6", bc:"#9a9890"},
              {icon:"💪", name:"Thoraxrotation (liegend)", detail:"Seitenlage, oberen Arm zur anderen Seite – BWS mobilisieren", badge:"2 × 8", bg:"#f0ede6", bc:"#9a9890"},
            ]
          }
        ],
        info:{col:"#9a9890", text:"Dieser Tag ist bewusst leer von Belastung. Dehnung & Mobilisation sind kein 'Bonus' – sie sind Training. Rückenprobleme entstehen oft durch Verkürzungen von Hüftbeuger und BWS-Steifigkeit."}
      },
      {
        name:"Dienstag", short:"Di", type:"lauf",
        title:"Lockerer Grundlagen-Lauf",
        duration:"35–55 Min",
        badge:{bg:"#dff5ec", col:"#0a5a44", label:"Laufen"},
        sections:[
          {
            title:"Aufwärmen (5 Min)",
            exercises:[
              {icon:"🚶", name:"Flott gehen", detail:"5 Min zügiges Gehen – Herzfrequenz sanft anheben", badge:"5 Min", bg:"#dff5ec", bc:"#1D9E75"},
              {icon:"🦵", name:"Lauf-ABC (Kniehebelauf, Anfersen)", detail:"Je 2 × 20 m – Laufökonomie trainieren", badge:"2 × 20m", bg:"#dff5ec", bc:"#1D9E75"},
            ]
          },
          {
            title:"Hauptteil – Zone 2 Lauf",
            exercises:[
              {icon:"🏃", name:"Monat 1–2: Lauf 25–30 Min", detail:"Tempo: du kannst dich vollständig unterhalten. HF: 120–142 bpm. Pace ca. 6:30–7:30 / km", badge:"25–30 Min", bg:"#dff5ec", bc:"#1D9E75"},
              {icon:"🏃", name:"Monat 3–4: Lauf 35–40 Min", detail:"Gleiches Tempo, längere Dauer. Distanz ca. 5–6 km. HF konsequent unter 142 bpm", badge:"35–40 Min", bg:"#dff5ec", bc:"#1D9E75"},
              {icon:"🏃", name:"Monat 5–6: Lauf 45–50 Min", detail:"Distanz ca. 7–8 km. Wenn HF stabil bleibt, Pace minimal steigern auf ~6:00 / km", badge:"45–50 Min", bg:"#dff5ec", bc:"#1D9E75"},
            ]
          },
          {
            title:"Auslaufen & Dehnen (5 Min)",
            exercises:[
              {icon:"🚶", name:"Auslaufen gehen", detail:"3 Min langsames Gehen, Puls senken", badge:"3 Min", bg:"#dff5ec", bc:"#1D9E75"},
              {icon:"🧘", name:"Stehende Quadrizeps-Dehnung", detail:"Je 30 Sek. pro Seite", badge:"2 × 30s", bg:"#dff5ec", bc:"#1D9E75"},
            ]
          }
        ],
        info:{col:"#1D9E75", text:"Zone 2 fühlt sich zu langsam an – das ist normal und richtig. Wenn HF über 145 steigt: laufen/gehen kombinieren. Kein Ego-Training in Phase 1."}
      },
      {
        name:"Mittwoch", short:"Mi", type:"kraft",
        title:"Kraft & Rumpf (Bodyweight + Bänder)",
        duration:"45–55 Min",
        badge:{bg:"#faecd8", col:"#7a4609", label:"Kraft / Rumpf"},
        sections:[
          {
            title:"Aktivierung (8 Min)",
            exercises:[
              {icon:"🔥", name:"Glute Bridge", detail:"Hüfte hoch drücken, Gesäß oben anspannen – 2 Sek. halten. Rücken flach!", badge:"3 × 15", bg:"#faecd8", bc:"#BA7517"},
              {icon:"🔥", name:"Clamshell mit Widerstandsband", detail:"Seitenlage, Band über Knien, oberes Knie öffnen – Gluteus medius aktivieren", badge:"3 × 15", bg:"#faecd8", bc:"#BA7517"},
              {icon:"🔥", name:"Dead Bug", detail:"Rücken flach, Lendenwirbel am Boden, abwechselnd Arm+Bein strecken. LANGSAM.", badge:"3 × 8", bg:"#faecd8", bc:"#BA7517"},
            ]
          },
          {
            title:"Kraft-Hauptteil",
            exercises:[
              {icon:"💪", name:"Bodyweight Squat", detail:"Füße schulterbreit, Knie über Zehen, Rücken gerade. Monat 1–2: langsam + kontrolliert", badge:"3 × 12", bg:"#faecd8", bc:"#BA7517"},
              {icon:"💪", name:"Reverse Lunge (rückwärts Ausfallschritt)", detail:"Rumpf stabil, Knie berührt nicht den Boden. Schonender für Knie als vorwärts", badge:"3 × 10", bg:"#faecd8", bc:"#BA7517"},
              {icon:"💪", name:"Push-Up (knie- oder zehen-gestützt)", detail:"Körper als Brett, Ellbogen 45° zum Körper. Rumpf aktiv halten", badge:"3 × 8–12", bg:"#faecd8", bc:"#BA7517"},
              {icon:"💪", name:"Band-Row (sitzend mit Band)", detail:"Band um Füße, aufrecht sitzen, Schulterblätter zusammenziehen – Gegenmuskeln zum Radfahren", badge:"3 × 12", bg:"#faecd8", bc:"#BA7517"},
            ]
          },
          {
            title:"Rumpf-Block (Rücken-Fokus)",
            exercises:[
              {icon:"🧱", name:"Plank (Unterarmstütz)", detail:"Körper gerade wie ein Brett. Becken nicht heben oder absenken. Atmen!", badge:"3 × 30s", bg:"#faecd8", bc:"#BA7517"},
              {icon:"🧱", name:"Bird-Dog", detail:"Vierfüßler, gegenüberliegendes Arm+Bein strecken – 3 Sek. halten. Hüfte stabil.", badge:"3 × 8", bg:"#faecd8", bc:"#BA7517"},
              {icon:"🧱", name:"Superman (Rückenstrecker)", detail:"Bauchlage, Arme und Beine gleichzeitig heben – tief im unteren Rücken spüren", badge:"3 × 10", bg:"#faecd8", bc:"#BA7517"},
              {icon:"🧱", name:"Side Plank", detail:"Seitlicher Unterarmstütz, Hüfte hebt. Monat 1–2: Knie abgestützt ok", badge:"3 × 20s", bg:"#faecd8", bc:"#BA7517"},
            ]
          }
        ],
        info:{col:"#BA7517", text:"Ab Monat 4: Widerstandsband beim Squat und Lunge einsetzen. Ab Monat 7 (Kraftraum): Goblet Squat, Romanian Deadlift und Barbell-Arbeit einführen."}
      },
      {
        name:"Donnerstag", short:"Do", type:"regen",
        title:"Aktive Regeneration / Mobilität",
        duration:"20–30 Min",
        badge:{bg:"#f0ede6", col:"#6a6860", label:"Regeneration"},
        sections:[
          {
            title:"Optionale leichte Aktivität",
            exercises:[
              {icon:"🚶", name:"Spaziergang", detail:"15–20 Min lockeres Gehen – fördert Durchblutung ohne neue Belastung", badge:"20 Min", bg:"#f0ede6", bc:"#9a9890"},
              {icon:"🧘", name:"Foam Rolling (falls vorhanden)", detail:"Waden, IT-Band, Brustwirbelsäule – je 60 Sek. pro Zone", badge:"10 Min", bg:"#f0ede6", bc:"#9a9890"},
            ]
          }
        ],
        info:{col:"#9a9890", text:"Donnerstag bleibt leicht. Wenn du müde bist: komplett ruhen. Regeneration ist Training."}
      },
      {
        name:"Freitag", short:"Fr", type:"rad",
        title:"Grundlagen-Radausfahrt",
        duration:"60–120 Min",
        badge:{bg:"#deedfb", col:"#154e8a", label:"Radfahren"},
        sections:[
          {
            title:"Einfahren (10 Min)",
            exercises:[
              {icon:"🚴", name:"Einfahren sehr locker", detail:"Flaches Gelände, ganz lockers Treten – Muskeln aufwärmen, HF unter 120 bpm", badge:"10 Min", bg:"#deedfb", bc:"#185FA5"},
            ]
          },
          {
            title:"Hauptteil – Zone 2 Ausdauer",
            exercises:[
              {icon:"🚴", name:"Monat 1–2: 50–60 Min Ausfahrt", detail:"Flach, Zone 2 (120–142 bpm), Kadenz 80–90 rpm. Pace ca. 20–22 km/h. Distanz: ~20–25 km", badge:"50–60 Min", bg:"#deedfb", bc:"#185FA5"},
              {icon:"🚴", name:"Monat 3–4: 75–90 Min Ausfahrt", detail:"Erste leichte Hügel ok. HF darf bei Anstiegen kurz auf 150 – danach wieder Zone 2. Distanz: ~30–40 km", badge:"75–90 Min", bg:"#deedfb", bc:"#185FA5"},
              {icon:"🚴", name:"Monat 5–6: 90–120 Min Ausfahrt", detail:"Kadenz-Fokus: 85–95 rpm bewusst halten. Distanz: ~40–50 km. Schnitt 22–24 km/h anstreben", badge:"90–120 Min", bg:"#deedfb", bc:"#185FA5"},
            ]
          },
          {
            title:"Ausfahren & Kadenz-Drill",
            exercises:[
              {icon:"🔁", name:"Kadenz-Intervalle (Monat 3+)", detail:"3 × 2 Min bei 95–100 rpm im leichten Gang – Trittrundheit trainieren", badge:"3 × 2 Min", bg:"#deedfb", bc:"#185FA5"},
              {icon:"🚴", name:"Ausfahren", detail:"10 Min sehr locker, ganz lockeres Treten", badge:"10 Min", bg:"#deedfb", bc:"#185FA5"},
            ]
          }
        ],
        info:{col:"#185FA5", text:"Kadenz ist wichtiger als Geschwindigkeit. 80–90 rpm schont die Knie und schult das neuromuskuläre System für den Ötztaler (5.500 Hm bedeuten stundenlanges Treten)."}
      },
      {
        name:"Samstag", short:"Sa", type:"kombi",
        title:"Kombi: Lauf + Rumpf",
        duration:"60–75 Min",
        badge:{bg:"#fbe8f0", col:"#8a2e52", label:"Kombi"},
        sections:[
          {
            title:"Lauf-Teil (40–50 Min)",
            exercises:[

let curPhase = 0; let curDay = 0;


// ─── RENDER ───────────────────────────────────────────────────────────────
function renderTPhases() {
  document.getElementById('tPhaseRow').innerHTML = phases.map((p,i) => `
    <div class="ppill ${i===curPhase?'active':''}"
      style="${i===curPhase?'background:'+p.col+';border-color:'+p.col:''}"
      onclick="selectTPhase(${i})">${p.label} – ${p.sub}</div>`).join('');
}

function renderTDays() {
  const p = phases[curPhase];
  document.getElementById('tDayTabs').innerHTML = p.days.map((d,i) => `
    <div class="dtab t-${d.type} ${i===curDay?'active':''}" onclick="selectTDay(${i})">${d.short}</div>`
  ).join('');
}

function renderTDay() {
  const p  = phases[curPhase];
  const d  = p.days[curDay];
  const tc = {lauf:"#dff5ec",rad:"#deedfb",kraft:"#faecd8",regen:"#f0ede6",kombi:"#fbe8f0"};

  // chips
  const chipsHtml = p.chips.map(c=>`<div class="chip">${c.l}: <span>${c.v}</span></div>`).join('');

  // sections
  const sectionsHtml = d.sections.map(s => `
    <div class="section">
      <div class="section-title">${s.title}</div>
      <div class="ex-list">
        ${s.exercises.map(e => `
          <div class="ex">
            <div class="ex-icon">${e.icon}</div>
            <div class="ex-body">
              <div class="ex-name">${e.name}</div>
              <div class="ex-detail">${e.detail}</div>
            </div>
            <div class="ex-badge" style="background:${e.bg};color:${e.bc}">${e.badge}</div>
          </div>`).join('')}
      </div>
    </div>`).join('');

  document.getElementById('tDayContent').innerHTML = `
    <div class="card">
      <div class="chips">${chipsHtml}</div>
      <div class="day-header">
        <div class="day-badge" style="background:${d.badge.bg};color:${d.badge.col}">${d.badge.label}</div>
        <div class="day-duration">${d.duration}</div>
      </div>
      <div class="day-title">${d.title}</div>
    </div>
    <div class="card">
      ${sectionsHtml}
      <div class="info-box" style="--accent:${p.col}">${d.info.text}</div>
    </div>
  `;
}

function selectTPhase(i) { curPhase=i; curDay=0; renderTPhases(); renderTDays(); renderTDay(); }
function selectTDay(i)   { curDay=i; renderTDays(); renderTDay(); }

renderTPhases();
renderTDays();
renderTDay();

function switchPanel(p){
  document.querySelectorAll('.panel').forEach(el=>el.classList.remove('active'));
  document.getElementById('panel-'+p).classList.add('active');
  document.querySelectorAll('.npill').forEach((b,i)=>b.classList.toggle('active',['training','ern'][i]===p));
}

let cEP=0,cEM=0;
function selEP(i){
  cEP=i;cEM=0;
  document.querySelectorAll('#ePhaseRow .ppill').forEach((c,idx)=>{
    c.classList.toggle('active',idx===i);
    if(idx===i){c.style.background=EP[i].col;c.style.borderColor=EP[i].col;c.style.color='#fff';}
    else{c.style.background='';c.style.borderColor='';c.style.color='';}
  });
  renderEP();
}
function selEM(i){
  cEM=i;
  document.querySelectorAll('.mtab').forEach((t,idx)=>t.classList.toggle('active',idx===i));
  renderRecipes();
}
function renderEP(){
  const d=EP[cEP];
  const protPct=Math.round(d.protein*4/d.kcal*100);
  const fatPct=Math.round(d.fat*9/d.kcal*100);
  const carbPct=100-protPct-fatPct;
  const carbG=Math.round(d.kcal*carbPct/100/4);
  document.getElementById('eStats').innerHTML=`
    <div class="stat"><div class="stat-label">Protein / Tag</div><div class="stat-val" style="color:${d.col}">${d.protein}g</div><div class="stat-sub">${d.pgkg}g / kg &middot; 76 kg</div></div>
    <div class="stat"><div class="stat-label">Kalorien / Tag</div><div class="stat-val" style="color:${d.col}">${d.kcal.toLocaleString('de-DE')}</div><div class="stat-sub">kcal</div></div>
    <div class="stat"><div class="stat-label">Kohlenhydrate</div><div class="stat-val" style="color:${d.col}">${carbG}g</div><div class="stat-sub">${carbPct}% der Energie</div></div>
    <div class="stat"><div class="stat-label">Fett / Tag</div><div class="stat-val" style="color:${d.col}">${d.fat}g</div><div class="stat-sub">${fatPct}% der Energie</div></div>`;
  document.getElementById('eMacros').innerHTML=[
    {l:`Protein &middot; ${d.protein}g`,pct:protPct,col:"#BA7517"},
    {l:`Kohlenhydrate &middot; ${carbG}g`,pct:carbPct,col:d.col},
    {l:`Fett &middot; ${d.fat}g`,pct:fatPct,col:"#3B6D11"},
  ].map(b=>`<div class="mrow"><div class="mlabel">${b.l}</div><div class="mtrack"><div class="mfill" style="width:${b.pct}%;background:${b.col}"></div></div><div class="mpct">${b.pct}%</div></div>`).join('');
  document.getElementById('eMealTabs').innerHTML=Object.keys(d.meals).map((m,i)=>
    `<button class="mtab${i===0?' active':''}" onclick="selEM(${i})">${m}</button>`).join('');
  renderRecipes();
  document.getElementById('eOmega').innerHTML=d.omega.map(o=>`
    <div class="oitem"><div class="odot" style="background:${o.col}"></div><div class="otext"><strong>${o.n}</strong>${o.d}</div></div>`).join('');
  document.getElementById('eTip').style.borderColor=d.col;
  document.getElementById('eTip').textContent=d.tip;
}
function renderRecipes(){
  const d=EP[cEP];
  const mk=Object.keys(d.meals)[cEM];
  document.getElementById('eRecipes').innerHTML=(d.meals[mk]||[]).map(v=>`
    <div class="rcard" style="border-color:${d.col}">
      <div class="rcard-name">${v.n}</div>
      <div class="rcard-desc">${v.d}</div>
      <div class="rcard-kcal">${v.k}</div>
      <div class="rtags">${v.t.map(t=>`<span class="rtag ${TM[t].c}">${TM[t].l}</span>`).join('')}</div>
    </div>`).join('');
}

document.getElementById('ePhaseRow').innerHTML=EP.map((d,i)=>`
  <div class="ppill${i===0?' active':''}"
    style="${i===0?'background:'+d.col+';border-color:'+d.col+';color:#fff':''}"
    onclick="selEP(${i})">${d.phase}</div>`).join('');
renderEP();
</script>
</body>
</html>
